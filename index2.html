function clsBase(p){

  const flavorScore=score(tj,KW.flavorStrong,KW.flavorWeak);
  const natural=naturalScore>=2&&flavorScore<2;
  const flavored=flavorScore>=2&&!natural;
  const lightScore=score(tj,KW.lightStrong,KW.lightWeak);
  const fullScore=score(tj,KW.fullStrong,KW.fullWeak);
  let strength="medium";
  if(lightScore>=2&&lightScore>fullScore)strength="light";
  if(fullScore>=2&&fullScore>lightScore)strength="full";
  const sweetScore=score(tj,KW.sweetStrong,KW.sweetWeak);
  const dryScore=score(tj,KW.dryStrong,KW.dryWeak);
  let sweet="neutral";
  if(sweetScore>=2&&sweetScore>dryScore)sweet="sweet";
  if(dryScore>=2&&dryScore>sweetScore)sweet="dry";
  const fcats=[];
  if(hit(tj,KW.fruit))fcats.push("fruit");
  if(hit(tj,KW.menthol))fcats.push("menthol");
  if(hit(tj,KW.sweetFlavor))fcats.push("sweet-flavor");
  if(hit(tj,KW.coffee))fcats.push("coffee");
  if(hit(tj,KW.spice))fcats.push("spice");
  if(hit(tj,KW.alcohol))fcats.push("alcohol");
  return{natural,flavored,strength,sweet,fcats,flavorScore,naturalScore,lightScore,fullScore,sweetScore,dryScore};
}

function generateLocalAiMemo(p){
  if(p.ai_memo) return p.ai_memo;
  const fixed=fixedProductProfile(p);
  const c=fixed||clsBase(p);
  const name=(p.name||"");
  const parts=[];
  if(c.note){parts.push(c.note.replace("として固定補正","です。"));}
  else if(c.flavored){if(c.fcats.includes("menthol"))parts.push("清涼感を軸にしたフレーバー系。");else if(c.fcats.includes("fruit"))parts.push("果実系の香りを楽しむタイプ。");else if(c.fcats.includes("sweet-flavor"))parts.push("甘い香りを前に出したデザート寄り。");else if(c.fcats.includes("coffee"))parts.push("コーヒー・紅茶系の香りを楽しむタイプ。");else if(c.fcats.includes("spice"))parts.push("スパイス感や個性を楽しむタイプ。");else parts.push("香りを楽しむ着香系。");}
  else if(c.natural){parts.push("無着香寄りで、葉本来の味を重視するタイプ。");}
  else{parts.push("大きく偏りすぎないバランス型。");}
  if(c.sweet==="sweet")parts.push("甘さは感じやすい方向。");else if(c.sweet==="dry")parts.push("甘さ控えめでドライ寄り。");else parts.push("甘さは中間的。");
  if(c.strength==="light")parts.push("軽めで吸いやすい。");else if(c.strength==="full")parts.push("吸いごたえはしっかりめ。");else parts.push("強さは中間程度。");
  if(name.includes("メンソール")||name.includes("ミント")||name.includes("アイス"))parts.push("清涼感を求める人向き。");
  if(name.includes("バージニア"))parts.push("バージニア系の自然な甘みが期待しやすい。");
  if(name.includes("ラタキア"))parts.push("スモーキーさが好きな人向き。");
  return parts.join(" ");
}

// ══════════════════════════════════════════════
// 3. cls() 結果キャッシュ（改善1）
//    商品IDをキーにして再計算を排除
// ══════════════════════════════════════════════
const _clsCache = new Map();
function cls(p){
  const key = p.product_id || p.url || p.name;
  if(_clsCache.has(key)) return _clsCache.get(key);
  if(p.ai_profile){
    const result = {
      flavored:!!p.ai_profile.flavored,
      natural:!!p.ai_profile.natural,
      strength:p.ai_profile.strength||"medium",
      sweet:p.ai_profile.sweet||"neutral",
      fcats:Array.isArray(p.ai_profile.fcats)?p.ai_profile.fcats:[],
      hybrid:!!p.ai_profile.hybrid,
      fixed:!!p.ai_profile.fixed,
      note:p.ai_profile.note||""
    };
    _clsCache.set(key, result);
    return result;
  }
  const base = clsBase(p);
  const fixed = fixedProductProfile(p);
  if(fixed){
    const result = {...base,...fixed,hybrid:false,fixed:true};
    _clsCache.set(key, result);
    return result;
  }
  const aiText = generateLocalAiMemo(p);
  const t = (p.name||"")+" "+(p.description||"")+" "+(p.brand||"")+" "+aiText;
  const aiFruit=hit(aiText,["フルーツ","果実"]);
  const aiMenthol=hit(aiText,["メンソール","清涼感","ミント"]);
  const aiSweetFlavor=hit(aiText,["デザート","甘い香り","スイーツ"]);
  const aiCoffee=hit(aiText,["コーヒー","紅茶"]);
  const aiSpice=hit(aiText,["スパイス","スモーキー"]);
  const aiAlcohol=hit(aiText,["酒","ラム","ワイン","ウイスキー","バーボン"]);
  const fcats=[...base.fcats];
  function add(x,cond){if(cond&&!fcats.includes(x))fcats.push(x)}
  add("fruit",aiFruit);add("menthol",aiMenthol);add("sweet-flavor",aiSweetFlavor);
  add("coffee",aiCoffee);add("spice",aiSpice);add("alcohol",aiAlcohol);
  let strength=base.strength;
  if(base.strength==="medium"){if(hit(aiText,["軽め","吸いやすい"]))strength="light";if(hit(aiText,["しっかりめ","吸いごたえ"]))strength="full";}
  let sweet=base.sweet;
  if(base.sweet==="neutral"){if(hit(aiText,["甘さは感じやすい","甘い"]))sweet="sweet";if(hit(aiText,["ドライ寄り","甘さ控えめ"]))sweet="dry";}
  let flavored=base.flavored,natural=base.natural;
  if(!flavored&&!natural){if(hit(aiText,["着香系","香りを楽しむ","フレーバー系"]))flavored=true;if(hit(aiText,["無着香寄り","葉本来"]))natural=true;}
  const result = {...base,flavored,natural,strength,sweet,fcats,hybrid:true};
  _clsCache.set(key, result);
  return result;
}

// 5. UI同期（改善3）：state復元時にactive/value を反映
// ══════════════════════════════════════════════
function syncUI(){
  // 検索
  const searchEl = document.getElementById("search");
  if(searchEl && state.search) searchEl.value = state.search;
  // ソート
  const sortEl = document.getElementById("sort");
  if(sortEl && state.sort) sortEl.value = state.sort;
  // 単一選択フィルター
  [["stock","data-stock"],["flavor","data-flavor"],["strength","data-strength"],["sweet","data-sweet"]].forEach(([key,attr])=>{
    document.querySelectorAll(`[${attr}]`).forEach(btn=>{
      btn.classList.toggle("active", btn.getAttribute(attr) === state[key]);
    });
  });
  // お気に入りフィルターボタン
  const favBtn = document.getElementById("fav-filter-btn");
  if(favBtn) favBtn.classList.toggle("active", state.showFav);

  document.querySelectorAll("[data-fcat]").forEach(btn=>{

}

let edits = JSON.parse(localStorage.getItem("izumiya_product_edits")||"{}");
function saveEdits(){ localStorage.setItem("izumiya_product_edits", JSON.stringify(edits)); }
function getProductId(p){ return p.product_id || p.url || p.name; }
function getPrice(p){ const e=edits[getProductId(p)]; return e&&e.price_yen!==undefined?e.price_yen:p.price_yen; }
function getVolume(p){ const e=edits[getProductId(p)]; return e&&e.volume_g!==undefined?e.volume_g:p.volume_g; }
function getPPG(p){ const price=getPrice(p),vol=getVolume(p); return price&&vol?Math.round(price/vol*10)/10:null; }
function isEdited(p){ return !!edits[getProductId(p)]; }

function editProduct(id){
  const p = PRODUCTS.find(x=>getProductId(x)===id);
  if(!p) return;
  const price = prompt("価格を入力してください（円）", getPrice(p)||"");
  if(price===null) return;
  const vol = prompt("内容量を入力してください（g）", getVolume(p)||"");
  if(vol===null) return;
  const np = parseInt(String(price).replace(/[^0-9]/g,""), 10);
  const nv = parseFloat(String(vol).replace(/[^0-9.]/g,""));
  if(!np||!nv){ alert("価格または内容量が正しくありません"); return; }
  edits[id] = {price_yen:np, volume_g:nv};
  saveEdits();
  render();
}

  delete edits[id];
  saveEdits();
  render();
}

// 9. フィルター（改善2）：pass() を統合・明快化
// ══════════════════════════════════════════════
function pass(p){
  const c = cls(p);
  // 在庫
  if(state.stock==="in"  && !p.in_stock) return false;
  if(state.stock==="out" &&  p.in_stock) return false;
  // お気に入り
  if(state.showFav && !favorites.has(favId(p))) return false;
  // 着香
  if(state.flavor==="flavored" && !c.flavored) return false;
  if(state.flavor==="natural"  && !c.natural)  return false;
  // 強さ
  if(state.strength!=="all" && c.strength!==state.strength) return false;
  // 甘さ
  if(state.sweet!=="all" && c.sweet!==state.sweet) return false;
  // フレーバー系統（AND条件：選択した全てが含まれること）
  for(const f of state.fcats) if(!c.fcats.includes(f)) return false;
  // テキスト検索
  if(state.search){
    const q = state.search.toLowerCase();
    const t = ((p.name||"")+" "+(p.description||"")+" "+(p.brand||"")+" "+(p.origin||"")).toLowerCase();
    if(!t.includes(q)) return false;
  }
  return true;
}

function sortList(list){
  const v = state.sort;
  const val = x => x??999999999;
  switch(v){
    case "price-asc":  list.sort((a,b)=>val(getPrice(a))-val(getPrice(b))); break;
    case "price-desc": list.sort((a,b)=>val(getPrice(b))-val(getPrice(a))); break;
    case "ppg-asc":    list.sort((a,b)=>val(getPPG(a))-val(getPPG(b)));     break;
    case "ppg-desc":   list.sort((a,b)=>val(getPPG(b))-val(getPPG(a)));     break;
    case "name":       list.sort((a,b)=>(a.name||"").localeCompare(b.name||"","ja")); break;
  }
  return list;
}

function tagHtml(p){
  const c = cls(p);
  const tags = [];
  if(c.flavored) tags.push(`<span class="ctag flavored">着香</span>`);
  if(c.natural)  tags.push(`<span class="ctag natural">非着香</span>`);
  tags.push(`<span class="ctag ${c.strength}">${c.strength==="light"?"ライト":c.strength==="full"?"フル":"ミディアム"}</span>`);
  if(c.sweet==="sweet") tags.push(`<span class="ctag sweet">甘め</span>`);
  if(c.sweet==="dry")   tags.push(`<span class="ctag">ドライ</span>`);
  for(const f of c.fcats){
    const label={fruit:"フルーツ",menthol:"メンソール","sweet-flavor":"スイーツ",coffee:"コーヒー・紅茶",spice:"スパイス",alcohol:"お酒"}[f]||f;
    const klass = f==="sweet-flavor"?"sweet":f;
    tags.push(`<span class="ctag ${klass}">${label}</span>`);
  }
  return tags.join("");
}

function card(p){
  const id    = getProductId(p);
  const isFav = favorites.has(favId(p));
  const price = getPrice(p);
  const vol   = getVolume(p);
  const ppg   = getPPG(p);
  const edited = isEdited(p);
  const img    = p.image_url?`<img class="img" src="${esc(p.image_url)}" loading="lazy" onerror="this.style.display='none'">`:"";
  const stock  = p.in_stock?`<span class="badge in">在庫あり</span>`:`<span class="badge out">在庫なし</span>`;
  const detail = p.url?`<a class="link detail" href="${esc(p.url)}" target="_blank">詳細</a>`:"";
  const aiq    = encodeURIComponent(`${p.name} 手巻きたばこ 味 特徴 ニコチン感 甘さ`);
  const ai     = `<a class="link ai" href="https://chat.openai.com/?q=${aiq}" target="_blank">AI検索</a>`;
  const ppgHtml = ppg?`<span class="ppg">${ppg}円/g</span>`:"";
  const volHtml = vol?`<span class="small">${vol}g</span>`:"";
  const origin  = p.origin?`<span class="small">${esc(p.origin)}</span>`:"";
  const editBtn = edited
    ? `<span class="edited">編集済</span><button class="edit-btn" onclick="resetEdit('${esc(id)}')">元に戻す</button>`
    : `<button class="edit-btn" onclick="editProduct('${esc(id)}')">編集</button>`;
  const aiLocalText = generateLocalAiMemo(p);
  const aiLocal = aiLocalText
    ? `<div class="ai-local"><div class="ai-local-title">📝 ローカル分析</div>${esc(aiLocalText)}</div>`
    : "";
  return `<div class="card">
    ${img}
    <div class="top"><a class="name" href="${esc(p.url||'#')}" target="_blank">${esc(p.name)}</a>${stock}</div>
    <div class="tags">${tagHtml(p)}</div>
    <div class="desc">${esc(p.description||"説明文なし")}</div>
    ${aiLocal}
    <div class="meta">
      <span class="price">${yen(price)}</span>
      ${volHtml}${ppgHtml}${origin}
      ${editBtn}
      <span class="fav-star ${isFav?'':'off'}" onclick="toggleFav('${esc(favId(p))}')">${isFav?'★':'☆'}</span>
    </div>
    <div class="links">${detail}${ai}</div>
  </div>`;
}

// 12. render()（改善2）：DocumentFragment + 差分描画
// ══════════════════════════════════════════════
const mainEl = document.getElementById("main");
let _lastRenderedKey = "";

function render(){
  if(!PRODUCTS.length){
    mainEl.innerHTML=`<div class="notice"><h2>商品データがありません</h2><p>右上の「更新」を押すと、商品一覧を取得して保存します。</p><p>初回は数分かかります。更新中はアプリを閉じないでください。</p><button class="update-btn" onclick="startUpdate()">更新</button></div>`;
    document.getElementById("count").textContent="0";
    updateCounts();
    return;
  }

  let list = PRODUCTS.filter(pass);
  sortList(list);

  document.getElementById("count").textContent = list.length;
  document.getElementById("total").textContent = PRODUCTS.length;

  // ブランドでグループ化
  const groups = new Map();
  for(const p of list){
    const b = p.brand||"その他";
    if(!groups.has(b)) groups.set(b,[]);
    groups.get(b).push(p);
  }

  if(!list.length){
    mainEl.innerHTML=`<div class="empty show">該当する商品が見つかりませんでした</div>`;
    updateCounts();
    return;
  }

  // DocumentFragmentで構築（改善2）
  const frag = document.createDocumentFragment();
  for(const [brand, items] of groups){
    const section = document.createElement("section");
    section.className = "brand-group";
    section.innerHTML =
      `<div class="brand-header"><div class="brand-name">${esc(brand)}</div><div class="brand-count">${items.length}件</div></div>` +
      `<div class="products-grid">${items.map(card).join("")}</div>`;
    frag.appendChild(section);
  }

  mainEl.replaceChildren(frag);
  updateCounts();
}

// 単一選択フィルター（data-* 属性名 → state キー）
[["data-stock","stock"],["data-flavor","flavor"],["data-strength","strength"],["data-sweet","sweet"]].forEach(([attr,key])=>{
  document.querySelectorAll(`[${attr}]`).forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(`[${attr}]`).forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      state[key] = btn.getAttribute(attr);
      saveState();
      render();
    });
  });
});

// タグ（複数選択）
document.querySelectorAll("[data-fcat]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const v = btn.dataset.fcat;
    if(state.fcats.has(v)){ state.fcats.delete(v); btn.classList.remove("active"); }
    else                   { state.fcats.add(v);    btn.classList.add("active"); }
    saveState();
    render();
  });
});

function showAiPanel(pid){
  const p = PRODUCTS.find(x=>getProductId(x)===pid);

  currentAiPrompt = p.name;
  const c = cls(p);
  const price = getPrice(p);
  const volume = getVolume(p);
  const ppg = getPPG(p);
  const lines = [];
  lines.push("検索語: "+p.name);
  lines.push("");
  lines.push("ページ内メモ");
  lines.push("・商品名のみを検索語として使用しています。");
  if(price)  lines.push("・価格: "+price.toLocaleString("ja-JP")+"円");
  if(volume) lines.push("・内容量: "+volume+"g");
  if(ppg)    lines.push("・g単価: "+ppg+"円/g");
  lines.push("・分類: "+(c.flavored?"着香":c.natural?"非着香":"判定保留")+" / "+(c.strength==="light"?"ライト":c.strength==="full"?"フル":"ミディアム")+" / "+(c.sweet==="sweet"?"甘め":c.sweet==="dry"?"ドライ":"甘さ中立"));
  if(c.fcats.length){
    const labels={fruit:"フルーツ",menthol:"メンソール","sweet-flavor":"スイーツ",coffee:"コーヒー・紅茶",spice:"スパイス",alcohol:"お酒"};
    lines.push("・系統: "+c.fcats.map(x=>labels[x]||x).join("、"));
  }
  lines.push("");
  lines.push("※実際のAI回答が必要な場合は「ChatGPTで開く」を押してください。");
  document.getElementById("ai-title").textContent  = "AI検索: "+p.name;

}
